<p class="label">CURRENT ACTIVE TICKET</p>
<div class="queue-number">{{ queueNumber }}</div>

<div class="action-list">
  <button class="action-item next-bg" (click)="takeNext()">
    <div class="icon-box blue-bg">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </div>
    <div class="text">
      <span class="main-text">รับคิวถัดไป</span>
      <span class="sub-text">Next Queue</span>
    </div>
    <span class="arrow">›</span>
  </button>

  <button class="action-item" (click)="resetAllQueues()">
    <div class="icon-box reset-bg">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
      </svg>
    </div>
    <div class="text">
      <span class="main-text">Reset All Queues</span>
      <span class="sub-text">ล้างคิว</span>
    </div>
    <span class="arrow">›</span>
  </button>

  <button class="action-item" (click)="done()">
    <div class="icon-box gray-bg">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </div>
    <div class="text">
      <span class="main-text">Back to Home</span>
      <span class="sub-text">กลับไปหน้าหลัก</span>
    </div>
  </button>
</div>
